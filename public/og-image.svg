<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#0A1628"/>

  <!-- Content container -->
  <g transform="translate(100, 240)">
    <!-- Company name -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF">
      <tspan x="0" dy="0">Sino Technology</tspan>
      <tspan x="0" dy="80">Solutions</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">
      <tspan x="0" dy="0">Enterprise IT infrastructure, cybersecurity,</tspan>
      <tspan x="0" dy="48">and AI research consulting</tspan>
    </text>
  </g>
</svg>
